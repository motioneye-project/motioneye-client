---
name: Manage labels

"on":
  push:
    branches:
      - main

permissions: {contents: read}

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0

      - name: Run Labeler
        uses: crazy-max/ghaction-github-labeler@v6.0.0
        with:
          skip-delete: true
