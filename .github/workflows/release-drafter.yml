---
name: Draft a release note

"on":
  push:
    branches:
      - main

permissions: {contents: read}

jobs:
  draft_release:
    name: Release Drafter
    runs-on: ubuntu-24.04
    steps:
      - name: Run release-drafter
        uses: release-drafter/release-drafter@v7.5.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
